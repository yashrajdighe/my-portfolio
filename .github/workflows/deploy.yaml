name: Deploy Portfolio
run-name: ${{ github.actor }} deploying portfolio
on:
  push:
    branches:
      - main
jobs:
  build-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        id: checkout-repo
        uses: actions/checkout@v6
      - name: Get Node.js Version
        id: get-node-version
        run: |
          export node_version=$(jq -r '.engines.node // empty' package.json | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
          echo "node_version=$node_version" >> $GITHUB_ENV
      - name: Setup Node.js
        id: setup-nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
          cache: "npm"
      - name: Install Dependencies
        id: install-dependencies
        run: npm ci
      - name: Build Webapp
        id: build-webapp
        run: |
          npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: out
          if-no-files-found: error
          retention-days: 7
  deploy-to-production:
    needs:
      - build-webapp
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out
      - name: Login with aws cli
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::403245569160:role/my-portfolio-app-production-deployment-role
          role-session-name: portfolio-deploy-to-production
      - name: Sync to S3
        run: |
          aws s3 sync ./out s3://my-portfolio-app-production-root --delete
