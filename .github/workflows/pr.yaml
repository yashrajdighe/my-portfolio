name: Pull Request Workflow
run-name: ${{ github.actor }} running pr build and checks
on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - id: checkout-repo
  #       uses: actions/checkout@v6
  #     - id: get-node-version
  #       run: |
  #         export node_version=$(jq -r '.engines.node // empty' package.json | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
  #         echo "node_version=$node_version" >> $GITHUB_ENV
  #     - id: setup-nodejs
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.node_version }}
  #         cache: "npm"
  #     - id: install-dependencies
  #       run: npm ci
  #     - id: run-es-lint
  #       run: npm run lint
  build-webapp:
    # needs:
    #   - lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        id: checkout-repo
        uses: actions/checkout@v6
      - name: Get Node.js Version
        id: get-node-version
        run: |
          export node_version=$(jq -r '.engines.node // empty' package.json | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
          echo "node_version=$node_version" >> $GITHUB_ENV
      - name: Setup Node.js
        id: setup-nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
          cache: "npm"
      - name: Install Dependencies
        id: install-dependencies
        run: npm ci
      - name: Build Webapp
        id: build-webapp
        run: |
          npm run build
          zip -r build.zip out/
      - name: Generate Release Tag
        id: generate-release-tag
        run: |
          # 1. Grab the current date in YYYY.MM.DD format
          calver_date=$(date +'%Y.%m.%d')

          # 2. Combine the date with a hyphen and the GitHub run number
          # Example output: v2026.03.08-42
          full_tag="v${calver_date}-${{ github.run_number }}"

          # 3. Save it to the environment
          echo "RELEASE_TAG=$full_tag" >> $GITHUB_ENV
      - name: Create Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          files: build.zip
          make_latest: true
          generate_release_notes: true
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: out
          if-no-files-found: error
          retention-days: 7
  deploy-to-development:
    needs:
      - build-webapp
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          name: build-output
      - name: Login with aws cli
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::672491114190:role/test-my-portfolio-deployment
      - name: Sync to S3
        run: |
          aws s3 sync ./out s3://playground-yashrajdighe-in-temporary-bucket/${{ env.RELEASE_TAG }}/ --delete
