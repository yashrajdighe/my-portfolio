name: Pull Request Workflow
run-name: ${{ github.actor }} running pr build and checks
on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - id: checkout-repo
  #       uses: actions/checkout@v6
  #     - id: get-node-version
  #       run: |
  #         export node_version=$(jq -r '.engines.node // empty' package.json | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
  #         echo "node_version=$node_version" >> $GITHUB_ENV
  #     - id: setup-nodejs
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.node_version }}
  #         cache: "npm"
  #     - id: install-dependencies
  #       run: npm ci
  #     - id: run-es-lint
  #       run: npm run lint
  build-webapp:
    # needs:
    #   - lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: checkout-repo
        uses: actions/checkout@v6
      - id: get-node-version
        run: |
          export node_version=$(jq -r '.engines.node // empty' package.json | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
          echo "node_version=$node_version" >> $GITHUB_ENV
      - id: setup-nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
          cache: "npm"
      - id: install-dependencies
        run: npm ci
      - id: build-webapp
        run: npm run build
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "vtest-${{ github.run_id }}" # 👈 Explicitly tells GitHub what tag to use
          name: "Test Release ${{ github.run_id }}" # (Optional) Gives the release a nice title
          files: out/*
